name: Build and Publish SidebarLib

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      
      - name: Build with Maven
        run: mvn clean install
      
      # Публикуем в GitHub Packages
      - name: Publish to GitHub Packages
        run: mvn deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      # Сохраняем JAR-файлы как артефакт (на случай, если нужны будут вручную)
      - name: Upload JARs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sidebar-libs
          path: |
            **/target/*.jar
            !**/target/original-*.jar
            !**/target/*-sources.jar
